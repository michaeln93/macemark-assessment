<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macemark — Assessment Results</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1b3a5c;--blue:#2563eb;--green:#057a55;--green-light:#d1fae5;--amber:#b45309;--amber-light:#fef3c7;--red:#c81e1e;--red-light:#fde8e8;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-700:#374151;--gray-800:#1f2937;--white:#fff;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.5}
header{background:var(--navy);color:var(--white);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
header .subtitle{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
main{max-width:1000px;margin:0 auto;padding:20px}
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.toolbar input{padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;flex:1;min-width:200px}
.toolbar input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.count{font-size:13px;color:var(--gray-500)}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.card-row{display:flex;align-items:center;padding:14px 16px;gap:16px}
.card-row .facility{font-weight:600;font-size:15px;flex:1;min-width:0}
.card-row .type{font-size:12px;color:var(--gray-500);background:var(--gray-100);padding:3px 10px;border-radius:12px;white-space:nowrap}
.card-row .date{font-size:12px;color:var(--gray-400);white-space:nowrap}
.card-row .contact{font-size:13px;color:var(--gray-500)}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-high{background:var(--red-light);color:var(--red)}
.badge-gaps{background:var(--amber-light);color:var(--amber)}
.badge-ok{background:var(--green-light);color:var(--green)}
.detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.detail.open{max-height:2000px}
.detail-body{padding:0 16px 16px;border-top:1px solid var(--gray-100)}
.detail-body pre{white-space:pre-wrap;font-size:13px;line-height:1.6;color:var(--gray-700);background:var(--gray-50);padding:12px;border-radius:var(--radius);margin-top:12px;max-height:500px;overflow-y:auto}
.empty{text-align:center;padding:60px 20px;color:var(--gray-400)}
.empty h2{margin-bottom:8px}
.setup-info{background:var(--amber-light);border-left:4px solid var(--amber);padding:16px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:20px;font-size:14px}
.setup-info code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:13px}
a{color:var(--blue)}
</style>
</head>
<body>
<header>
  <div>
    <h1>Macemark Technology</h1>
    <div class="subtitle">Assessment Results</div>
  </div>
  <a href="index.html" style="color:rgba(255,255,255,.7);font-size:13px;text-decoration:none">&larr; Back to Assessment Tool</a>
</header>

<main>
  <div id="setupBanner" class="setup-info" style="display:none">
    <strong>Setup Required:</strong> To view submitted results, configure the <code>SHEET_URL</code> in this file with your published Google Sheet CSV URL. See the setup guide in the repository README.
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search by facility name, contact, or type..." oninput="filterResults()">
    <div class="count" id="resultCount"></div>
  </div>

  <div id="resultsList"></div>
</main>

<script>
// Published Google Sheet CSV URL — set after setup
const SHEET_URL = ''; // Paste your Google Sheets "Publish to web" CSV URL here

let allResults = [];

async function loadResults(){
  const list = document.getElementById('resultsList');

  if(!SHEET_URL){
    document.getElementById('setupBanner').style.display = 'block';
    list.innerHTML = '<div class="empty"><h2>No data source configured</h2><p>Set up the Google Sheets integration to start viewing submitted assessments.</p></div>';
    return;
  }

  list.innerHTML = '<div class="empty"><p>Loading results...</p></div>';

  try {
    const resp = await fetch(SHEET_URL);
    const csv = await resp.text();
    allResults = parseCSV(csv);
    renderResults(allResults);
  } catch(e){
    list.innerHTML = '<div class="empty"><h2>Could not load results</h2><p>Check the Sheet URL configuration.</p></div>';
  }
}

function parseCSV(csv){
  const lines = csv.split('\n');
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const results = [];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    // Simple CSV parse (handles quoted fields with commas)
    const vals = [];
    let current = '';
    let inQuotes = false;
    for(let c=0;c<lines[i].length;c++){
      const ch = lines[i][c];
      if(ch==='"') { inQuotes=!inQuotes; continue; }
      if(ch===','&&!inQuotes) { vals.push(current.trim()); current=''; continue; }
      current+=ch;
    }
    vals.push(current.trim());
    const row = {};
    headers.forEach((h,idx)=>row[h]=vals[idx]||'');
    results.push(row);
  }
  return results.reverse(); // newest first
}

function renderResults(results){
  const list = document.getElementById('resultsList');
  document.getElementById('resultCount').textContent = `${results.length} assessment${results.length!==1?'s':''}`;

  if(results.length===0){
    list.innerHTML = '<div class="empty"><h2>No results found</h2><p>No assessments match your search.</p></div>';
    return;
  }

  list.innerHTML = results.map((r,i)=>{
    const gaps = parseInt(r.gap_count)||0;
    const recs = parseInt(r.rec_count)||0;
    return `<div class="card" onclick="toggleDetail(${i})">
      <div class="card-row">
        <div style="flex:1;min-width:0">
          <div class="facility">${esc(r.facility_name||'Unnamed')}</div>
          <div class="contact">${esc(r.contact_person||'')} ${r.contact_email?'— '+esc(r.contact_email):''}</div>
        </div>
        <span class="type">${esc(r.facility_type||'—')}</span>
        ${gaps>0?`<span class="badge badge-gaps">${gaps} gap${gaps>1?'s':''}</span>`:`<span class="badge badge-ok">No gaps</span>`}
        <div class="date">${esc(r.timestamp||'')}</div>
      </div>
      <div class="detail" id="detail-${i}">
        <div class="detail-body">
          <pre>${esc(r.summary||'No summary available')}</pre>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(idx){
  const el = document.getElementById('detail-'+idx);
  el.classList.toggle('open');
}

function filterResults(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  if(!q){ renderResults(allResults); return; }
  const filtered = allResults.filter(r=>
    (r.facility_name||'').toLowerCase().includes(q) ||
    (r.contact_person||'').toLowerCase().includes(q) ||
    (r.facility_type||'').toLowerCase().includes(q) ||
    (r.contact_email||'').toLowerCase().includes(q)
  );
  renderResults(filtered);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

loadResults();
</script>
</body>
</html>
